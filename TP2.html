<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajo Práctico Carrusel</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Estilos personalizados para que el carrusel se vea mejor como encabezado */
        .carousel-item img {
            height: 60vh; /* Ocupa el 60% de la altura de la pantalla */
            object-fit: cover; /* Asegura que la imagen no se deforme */
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <header>
        <div id="carouselExampleControls" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="https://picsum.photos/1920/1080?random=1" class="d-block w-100" alt="Primera imagen de muestra">
                </div>
                <div class="carousel-item">
                    <img src="https://picsum.photos/1920/1080?random=2" class="d-block w-100" alt="Segunda imagen de muestra">
                </div>
                <div class="carousel-item">
                    <img src="https://picsum.photos/1920/1080?random=3" class="d-block w-100" alt="Tercera imagen de muestra">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Siguiente</span>
            </button>
        </div>
    </header>

    <main class="container my-5 flex-grow-1">
        <div class="p-5 text-center bg-white rounded-4 shadow-sm">
            <h1 class="display-4 fw-bold text-primary mb-3">TP2</h1>
            <p class="lead text-muted">Las imagenes que aparecen en el carrusel fueron tomadas de Lorem Picsum, un sitio gratuito que genera imagenes.</p>
            <hr class="my-4">
            <p></p>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-2">Contacto Referido: <a href="[URL_DE_LA_FUENTE_DE_INFORMACION]" class="text-white fw-bold"> picsum.photos</a></p>
            <p class="mb-0 text-white-50">
                &copy; 2026 - Santiago Daniel Chocobar
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
